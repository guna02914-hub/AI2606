<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Study Alarm</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section class="hero">
      <div>
        <p class="eyebrow">Daily Reminder</p>
        <h1>Study Alarm</h1>
        <p class="description">
          정해둔 시간마다 알림을 울려주는 깔끔한 웹 알람입니다.
        </p>
      </div>

      <div class="clock-card">
        <span class="clock-label">현재 시간</span>
        <strong id="currentTime">00:00:00</strong>
        <span id="currentDate">0000.00.00</span>
      </div>
    </section>

    <section class="panel">
      <div class="panel-header">
        <div>
          <h2>알람 추가</h2>
          <p>제목과 시간을 입력한 뒤 알람을 추가하세요.</p>
        </div>
        <button id="notificationBtn" class="ghost-button" type="button">
          브라우저 알림 허용
        </button>
      </div>

      <form id="alarmForm" class="alarm-form">
        <label>
          알람 제목
          <input
            id="alarmTitle"
            type="text"
            placeholder="예: 공부 시작, 쉬는 시간"
            maxlength="30"
            required
          />
        </label>

        <label>
          알람 시간
          <input id="alarmTime" type="time" required />
        </label>

        <label>
          반복 설정
          <select id="alarmRepeat">
            <option value="daily">매일 반복</option>
            <option value="once">한 번만</option>
          </select>
        </label>

        <button class="primary-button" type="submit">알람 추가</button>
      </form>
    </section>

    <section class="panel">
      <div class="panel-header">
        <div>
          <h2>알람 목록</h2>
          <p id="alarmCount">등록된 알람이 없습니다.</p>
        </div>
        <button id="clearBtn" class="ghost-button danger" type="button">
          전체 삭제
        </button>
      </div>

      <ul id="alarmList" class="alarm-list"></ul>

      <div id="emptyState" class="empty-state">
        <div class="empty-icon">⏰</div>
        <strong>아직 등록된 알람이 없습니다.</strong>
        <p>첫 번째 알람을 추가해보세요.</p>
      </div>
    </section>
  </main>

  <div id="alarmModal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-card">
      <div class="ring-icon">🔔</div>
      <p class="modal-label">알람 시간입니다</p>
      <h2 id="modalTitle">알람</h2>
      <p id="modalTime">00:00</p>
      <button id="stopAlarmBtn" class="primary-button" type="button">
        알람 끄기
      </button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
